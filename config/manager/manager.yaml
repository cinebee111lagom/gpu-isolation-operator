apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-isolation-operator
  namespace: gpu-isolation-system
  labels:
    app: gpu-isolation-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-isolation-operator
  template:
    metadata:
      labels:
        app: gpu-isolation-operator
    spec:
      serviceAccountName: gpu-isolation-manager
      containers:
        - name: manager
          image: gpu-isolation-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --webhook-cert-dir=/tmp/k8s-webhook-server/serving-certs
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
      volumes:
        - name: cert
          secret:
            secretName: gpu-isolation-webhook-server-cert
