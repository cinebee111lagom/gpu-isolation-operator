# Default values for gpu-isolation-operator.

nameOverride: ""
fullnameOverride: ""

namespace:
  # Create the target namespace via Helm.
  create: true
  name: gpu-isolation-system

image:
  repository: gpu-isolation-operator
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

leaderElection:
  enabled: true

serviceAccount:
  create: true
  name: gpu-isolation-manager
  annotations: {}

rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

priorityClassName: ""

manager:
  args:
    metricsBindAddress: "0"
    healthProbeBindAddress: ":8081"
    webhookCertDir: /tmp/k8s-webhook-server/serving-certs
  extraArgs: []

livenessProbe:
  httpGet:
    path: /healthz
    port: health
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /readyz
    port: health
  initialDelaySeconds: 5
  periodSeconds: 10

service:
  type: ClusterIP
  port: 443
  targetPort: 9443

webhook:
  failurePolicy: Fail
  timeoutSeconds: 10
  mutatingPath: /mutate-v1-pod-gpu-isolation
  validatingPath: /validate-v1-pod-gpu-isolation
  # Base64-encoded CA bundle for webhook clientConfig.
  # Required when certManager.enabled=false.
  caBundle: ""
  certSecretName: gpu-isolation-webhook-server-cert
  namespaceSelector: {}
  objectSelector: {}

certManager:
  enabled: true
  issuer:
    create: true
    kind: Issuer
    name: gpu-isolation-selfsigned-issuer
  certificate:
    create: true
    name: gpu-isolation-serving-cert
    secretName: gpu-isolation-webhook-server-cert
    duration: 8760h
    renewBefore: 720h

defaultPolicy:
  enabled: false
  name: default-gpu-policy
  active: true
  spec:
    enforcementMode: Enforce
    gpuResourceNames:
      - nvidia.com/gpu
    gpuNodeSelector:
      accelerator: nvidia-gpu
    gpuTaint:
      key: dedicated
      value: gpu
      effect: NoSchedule
    allowedNamespaces:
      matchNames:
        - ml-platform
        - ai-training
      matchLabels:
        gpu-access: "true"
    priorityClass:
      name: gpu-high-priority
      value: 100000
      globalDefault: false
      description: Priority class for authorized GPU workloads
    quota:
      defaultDenyGpu: true
      allowedNamespaceGpuLimit: "8"
    mutation:
      injectToleration: true
      injectNodeAffinity: true
      injectPriorityClass: true
    validation:
      denyGpuInUnauthorizedNamespace: true
      denyMissingPriorityClass: true
      denyMissingToleration: true
      denyMissingNodeAffinity: true
      denyNodeNameBypass: true
      denyHostNetworkBypass: true
      denyUnauthorizedSchedulerName: true
      denyIllegalGpuNodeAffinity: true
