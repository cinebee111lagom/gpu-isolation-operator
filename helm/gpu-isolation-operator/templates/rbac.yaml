{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gpu-isolation-operator.clusterRoleName" . }}
  labels:
    {{- include "gpu-isolation-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["platform.example.com"]
    resources: ["gpuisolationpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.example.com"]
    resources: ["gpuisolationpolicies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["platform.example.com"]
    resources: ["gpuisolationpolicies/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["scheduling.k8s.io"]
    resources: ["priorityclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gpu-isolation-operator.clusterRoleName" . }}
  labels:
    {{- include "gpu-isolation-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "gpu-isolation-operator.clusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gpu-isolation-operator.serviceAccountName" . }}
    namespace: {{ include "gpu-isolation-operator.namespace" . }}
{{- end }}
