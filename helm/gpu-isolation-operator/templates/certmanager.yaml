{{- if and .Values.certManager.enabled .Values.certManager.issuer.create }}
apiVersion: cert-manager.io/v1
kind: {{ .Values.certManager.issuer.kind }}
metadata:
  name: {{ .Values.certManager.issuer.name }}
  namespace: {{ include "gpu-isolation-operator.namespace" . }}
  labels:
    {{- include "gpu-isolation-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
---
{{- if and .Values.certManager.enabled .Values.certManager.certificate.create }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certManager.certificate.name }}
  namespace: {{ include "gpu-isolation-operator.namespace" . }}
  labels:
    {{- include "gpu-isolation-operator.labels" . | nindent 4 }}
spec:
  dnsNames:
    {{- include "gpu-isolation-operator.webhookServiceDNSNames" . | nindent 4 }}
  issuerRef:
    kind: {{ .Values.certManager.issuer.kind }}
    name: {{ .Values.certManager.issuer.name }}
  secretName: {{ .Values.certManager.certificate.secretName }}
  {{- with .Values.certManager.certificate.duration }}
  duration: {{ . }}
  {{- end }}
  {{- with .Values.certManager.certificate.renewBefore }}
  renewBefore: {{ . }}
  {{- end }}
{{- end }}
